<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEO Prompter</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Montserrat',sans-serif; background:#0f0f0f; color:white; overflow:hidden; }
.settings { position:fixed; width:100%; height:100%; overflow-y:auto; padding:16px; }

textarea,input { width:100%; border-radius:12px; border:none; padding:12px; margin-top:6px; font-size:16px; }
textarea { height:180px; resize:none; }
.label { margin-top:12px; display:block; font-size:14px; opacity:0.8; }

.button-main { width:100%; padding:16px; margin-top:16px; border-radius:16px; border:none; font-size:20px; font-weight:700; color:white; background: linear-gradient(45deg,#FF0040,#F6C90E,#00F0FF); cursor:pointer; transition:0.2s; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
.button-main:hover { transform:scale(1.05); }

.button-secondary { width:100%; padding:12px; margin-top:10px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer; transition:0.2s; }
.button-secondary:hover { background:rgba(255,255,255,0.2); }

.teleprompter { display:none; position:fixed; width:100%; height:100%; background:black; overflow:hidden; }
.close-btn { position:absolute; top:15px; right:15px; font-size:32px; cursor:pointer; z-index:999; color:#FF0040; text-shadow:0 0 8px rgba(255,0,64,0.8); }
.text { position:absolute; width:100%; text-align:center; top:100%; padding:0 10px; line-height:1.5; }

/* LINES PREVIEW */
.line-container { position:absolute; width:100%; height:100%; }
.line { width:90%; height:2px; margin:8px auto; background:rgba(255,255,255,0.2); animation: moveLine 2s linear infinite; }
@keyframes moveLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* CONTROLS */
.controls { position: fixed; bottom: 20px; width:100%; display: flex; justify-content: space-between; padding: 0 20px; }
.control-block { text-align:center; }

.circle-btn { width:70px; height:70px; border-radius:50%; border:none; font-size:24px; background: linear-gradient(135deg,#FF0040,#F6C90E,#00F0FF); color:white; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.5); transition:0.2s; }
.circle-btn:hover { transform:scale(1.1); }

.label-small { font-size:12px; margin-top:5px; opacity:0.8; }

/* Speed & Font */
.speed-controls, .font-controls { position:fixed; width:100%; text-align:center; }
.speed-controls { bottom:110px; }
.font-controls { bottom:180px; }
.speed-controls button, .font-controls button { margin:5px; padding:10px 15px; border-radius:16px; border:none; background:linear-gradient(135deg,#FF0040,#F6C90E,#00F0FF); color:white; font-weight:600; font-size:16px; cursor:pointer; transition:0.2s; box-shadow:0 5px 15px rgba(0,0,0,0.5);}
.speed-controls button:hover, .font-controls button:hover{ transform:scale(1.1); }

.pause-btn { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); padding:12px 28px; font-size:18px; border:none; border-radius:20px; background:linear-gradient(135deg,#FF0040,#F6C90E,#00F0FF); color:white; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.5); transition:0.2s;}
.pause-btn:hover{ transform:scale(1.05); }

/* АКОРДЕОН */
.accordion { width:100%; margin-top:16px; }
.accordion-item { border-top:1px solid rgba(255,255,255,0.2); }
.accordion-header { padding:12px; cursor:pointer; font-weight:600; background:rgba(255,255,255,0.05); transition:0.2s;}
.accordion-header:hover { background:rgba(255,255,255,0.15);}
.accordion-content { display:none; padding:10px 15px; background:rgba(255,255,255,0.05); border-radius:10px; }
.copy-btn, .use-btn { padding:6px 10px; margin:3px; border:none; border-radius:10px; background:linear-gradient(135deg,#FF0040,#F6C90E,#00F0FF); color:white; cursor:pointer; font-size:12px; transition:0.2s; }
.copy-btn:hover, .use-btn:hover { transform:scale(1.05); }

/* AI Links */
.ai-links { margin-top:20px; text-align:center; font-size:14px; }
.ai-links a { margin:5px; color:#FF0040; font-weight:600; text-decoration:none; transition:0.2s;}
.ai-links a:hover { color:#00F0FF; }
</style>
</head>
<body>

<div class="settings">
<h2>VEO Prompter</h2>

<button class="button-main" onclick="toggleSettings()">Налаштувати суфлер</button>

<div id="settingsPanel" style="display:none; margin-top:10px;">
    <span class="label">Текст</span>
    <textarea id="inputText"></textarea>
    <button class="button-secondary" onclick="clearText()">Очистити текст</button>

    <span class="label">Швидкість</span>
    <input type="range" id="speed" min="0.2" max="5" step="0.1" value="1">

    <span class="label">Розмір тексту</span>
    <input type="number" id="fontSize" value="40">

    <span class="label">Назад (сек)</span>
    <input type="number" id="backStep" value="5">
    <span class="label">Вперед (сек)</span>
    <input type="number" id="forwardStep" value="5">

    <div class="label" id="readingTime">Час читання: 0 хв 0 сек</div>
</div>

<button class="button-main" onclick="start()">Запустити</button>

<div class="accordion">
<div class="accordion-item">
<div class="accordion-header" onclick="toggleAccordion(this)">Ідеї для текстів</div>
<div class="accordion-content" id="ideasContent"></div>
</div>
</div>

</div>

<div class="teleprompter" id="teleprompter">
<div class="close-btn" onclick="exitTeleprompter()">✕</div>
<div class="line-container" id="lineContainer"></div>
<div class="text" id="text"></div>

<div class="font-controls">
    <button onclick="changeFontSize(-2)">Шрифт -</button>
    <button onclick="changeFontSize(2)">Шрифт +</button>
</div>

<div class="speed-controls">
    <button onclick="changeSpeed(0.8)">− Швидкість</button>
    <button onclick="changeSpeed(1.2)">+ Швидкість</button>
</div>

<button class="pause-btn" id="pauseBtn" onclick="togglePause()">Пауза</button>

<div class="controls">
    <div class="control-block">
        <button class="circle-btn" onclick="smoothSkip(-1)">⟲</button>
        <div class="label-small" id="backLabel"></div>
    </div>
    <div class="control-block">
        <button class="circle-btn" onclick="smoothSkip(1)">⟳</button>
        <div class="label-small" id="forwardLabel"></div>
    </div>
</div>

<div class="ai-links">
Ви можете генерувати свої тексти через AI: 
<a href="https://chat.openai.com" target="_blank">ChatGPT</a> | 
<a href="https://www.deepseek.ai/" target="_blank">DeepSeek</a> | 
<a href="https://www.gemini.com/" target="_blank">Gemini</a> | 
<a href="#" target="_blank">Grok</a>
</div>
</div>

</script>

</body>
</html>

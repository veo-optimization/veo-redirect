<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Teleprompter</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #0f0f0f;
    color: white;
}

/* ===== НАЛАШТУВАННЯ ===== */

.settings {
    padding: 16px;
    max-width: 600px;
    margin: auto;
}

h2 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 140px;
    border-radius: 12px;
    border: none;
    padding: 12px;
    font-size: 16px;
    resize: none;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 5px;
    font-size: 16px;
}

.label {
    margin-top: 12px;
    display: block;
    font-size: 14px;
    opacity: 0.8;
}

.button-main {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #4CAF50, #2ecc71);
    color: white;
    font-weight: 600;
}

/* ===== СУФЛЕР ===== */

.teleprompter {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* кнопка виходу */
.close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 28px;
    color: white;
    z-index: 10;
    cursor: pointer;
}

/* текст */
.text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 100%;
    padding: 0 10px;
    line-height: 1.4;
}

/* керування */
.controls {
    position: fixed;
    bottom: 15px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}

.controls button {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(5px);
}

/* мобільна адаптація */
@media (max-width: 480px) {
    .controls button {
        font-size: 13px;
        padding: 8px 10px;
    }
}
</style>
</head>

<body>

<div class="settings">
    <h2>Суфлер</h2>

    <span class="label">Текст</span>
    <textarea id="inputText">Каталог ROSSO TT</textarea>

    <span class="label">Швидкість</span>
    <input type="number" id="speed" value="1" step="0.1">

    <span class="label">Розмір тексту</span>
    <input type="number" id="fontSize" value="40">

    <span class="label">Назад (сек)</span>
    <input type="number" id="backStep" value="5">

    <span class="label">Вперед (сек)</span>
    <input type="number" id="forwardStep" value="5">

    <button class="button-main" onclick="start()">Запустити</button>
</div>

<div class="teleprompter" id="teleprompter">

    <div class="close-btn" onclick="exitTeleprompter()">✕</div>

    <div class="text" id="text"></div>

    <div class="controls">
        <button onclick="changeSpeed(0.7)">Повільніше</button>
        <button onclick="changeSpeed(1.3)">Швидше</button>

        <button onclick="skip(-1)">⬅ Назад</button>
        <button onclick="skip(1)">Вперед ➡</button>
    </div>
</div>

<script>
let position = window.innerHeight;
let speed = 1;
let interval;

function start() {
    const text = document.getElementById('inputText').value;
    speed = parseFloat(document.getElementById('speed').value);
    const fontSize = document.getElementById('fontSize').value;

    document.querySelector('.settings').style.display = 'none';
    document.getElementById('teleprompter').style.display = 'block';

    const textDiv = document.getElementById('text');
    textDiv.innerText = text;
    textDiv.style.fontSize = fontSize + 'px';

    position = window.innerHeight;

    interval = setInterval(scrollText, 30);
}

function scrollText() {
    position -= speed;
    document.getElementById('text').style.top = position + 'px';
}

function changeSpeed(multiplier) {
    speed *= multiplier;
}

function skip(direction) {
    const back = parseInt(document.getElementById('backStep').value);
    const forward = parseInt(document.getElementById('forwardStep').value);

    let seconds = direction === -1 ? back : forward;

    position += direction * seconds * 50;
}

function exitTeleprompter() {
    clearInterval(interval);
    document.getElementById('teleprompter').style.display = 'none';
    document.querySelector('.settings').style.display = 'block';
}
</script>

</body>
</html>

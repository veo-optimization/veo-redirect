<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контент-План для Блогера</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Стилізація під гормони */
        .hormone-cortisol { border-left: 5px solid #EF4444; background-color: #FEF2F2; }
        .hormone-dopamine { border-left: 5px solid #F59E0B; background-color: #FFFBEB; }
        .hormone-oxytocin { border-left: 5px solid #EC4899; background-color: #FDF2F8; }
        .hormone-serotonin { border-left: 5px solid #3B82F6; background-color: #EFF6FF; }
        .hormone-endorphin { border-left: 5px solid #10B981; background-color: #ECFDF5; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-12">

    <header class="sticky top-0 z-50 bg-white shadow-md p-4">
        <div class="max-w-md mx-auto">
            <h1 class="text-xl font-bold text-center text-indigo-600 mb-2">Контент-План: 90 Відео</h1>
            
            <div class="space-y-2">
                <input type="text" id="searchInput" placeholder="Пошук за гачком або текстом..." 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                
                <div class="flex gap-2 overflow-x-auto pb-1 text-xs scrollbar-none">
                    <button onclick="filterNiche('all')" class="bg-indigo-600 text-white px-3 py-1.5 rounded-full font-medium whitespace-nowrap">Всі</button>
                    <button onclick="filterNiche('tiktok-shop')" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full font-medium whitespace-nowrap">Іспанія → TikTok Shop</button>
                    <button onclick="filterNiche('cosmetics')" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full font-medium whitespace-nowrap">Косметика</button>
                    <button onclick="filterNiche('products')" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full font-medium whitespace-nowrap">Продукти</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 space-y-4" id="videoContainer">
        </main>

    <script>
        // Масив даних. Сюди можна дописувати всі 90 відео за аналогією.
        const videos = [
            {
                id: 1,
                day: 1,
                videoNum: 1,
                niche: 'tiktok-shop',
                nicheLabel: 'Іспанія → TikTok Shop → Україна',
                hormone: 'cortisol',
                hormoneLabel: 'Кортизол (Страх / Терміновість)',
                hormoneExplain: 'Тригерує занепокоєння через втрачену вигоду або закриті можливості, змушуючи дивитися далі.',
                hook: '«Чому звичайні байєри в Україні втратять 70% доходу вже цього місяця?»',
                hookExplain: 'Гачок бʼє в страх втрати грошей і невідомості перед новими алгоритмами TikTok Shop.',
                scriptText: 'Привіт! Поки всі возять речі по-старому, в Іспанії запустили прямі відвантаження через TikTok Shop на Європу та Україну. Хто перший розбереться — забере ринок. Ось покроковий план, як підключити кабінет...',
                cta: 'Переходь за лінком у шапці, забирай гайд з налаштування.'
            },
            {
                id: 2,
                day: 1,
                videoNum: 2,
                niche: 'cosmetics',
                nicheLabel: 'Лінія Косметики',
                hormone: 'dopamine',
                hormoneLabel: 'Дофамін (Задоволення / Очікування новизни)',
                hormoneExplain: 'Обіцяє швидкий і легкий результат, викликає інтерес та бажання отримати «секрет».',
                hook: '«Ефект скляної шкіри за 48 годин без жодного хайлайтера. Показую один засіб...»',
                hookExplain: 'Обіцянка миттєвого візуального результату, яка стимулює дофаміновий сплеск.',
                scriptText: 'Дівчата, тренд на clean girl міняється. Цей іспанський сироватковий концентрат робить шкіру сяючою зсередини. Дивіться на текстуру — вона вбирається за 3 секунди й залишає фініш, як після процедури за 100$.',
                cta: 'Пиши «ХОЧУ» в коментарях, скину назву бренду.'
            },
            {
                id: 3,
                day: 1,
                videoNum: 3,
                niche: 'products',
                nicheLabel: 'Лінія Продуктів',
                hormone: 'oxytocin',
                hormoneLabel: 'Окситоцин (Турбота / Довіра / Спільнота)',
                hormoneExplain: 'Створює відчуття затишку, приналежності до родини чи близького кола людей.',
                hook: '«Рецепт сніданку, який змусить вашу родину збігтися на кухню за 5 хвилин»',
                hookExplain: 'Апелює до сімейних цінностей, тепла та затишку, що викликає довіру.',
                scriptText: 'Сьогодні готуємо традиційні іспанські чуррос із гарячим шоколадом. Це простіше, ніж здається, але аромат створює атмосферу справжньої мадридської кав\'ярні прямо у вас вдома. Записуйте пропорції...',
                cta: 'Збережи це відео, щоб порадувати своїх у вихідні.'
            }
            // Сюди можна додавати об'єкти від 4 до 90...
        ];

        // Функція рендерингу карток
        function renderVideos(data) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';

            if(data.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-8">Нічого не знайдено</p>`;
                return;
            }

            data.forEach(v => {
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl shadow-sm p-4 border transition-all hormone-${v.hormone} video-card`;
                card.setAttribute('data-niche', v.niche);

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs font-bold text-indigo-600 uppercase bg-indigo-50 px-2 py-0.5 rounded">День ${v.day} • Відео ${v.videoNum}</span>
                            <div class="text-xs text-gray-500 mt-1 font-medium">${v.nicheLabel}</div>
                        </div>
                        <span class="text-[10px] px-2 py-1 rounded-full font-semibold bg-white border border-gray-200 shadow-2xs">${v.hormoneLabel.split(' ')[0]}</span>
                    </div>

                    <div class="mt-2">
                        <div class="text-xs text-gray-400 uppercase font-bold tracking-wider">Гачок (Hook)</div>
                        <p class="text-sm font-bold text-gray-900 mt-0.5">${v.hook}</p>
                    </div>

                    <details class="group mt-3 border-t border-gray-100 pt-2">
                        <summary class="list-none flex justify-between items-center cursor-pointer text-xs font-semibold text-indigo-600 focus:outline-none">
                            <span>Розгорнути сценарій та логіку</span>
                            <span class="transition group-open:rotate-180">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </span>
                        </summary>
                        
                        <div class="mt-3 space-y-3 text-xs text-gray-700 bg-white/50 p-2 rounded-lg">
                            <div>
                                <span class="font-bold text-gray-900 block">Психологія гачка:</span>
                                <p class="text-gray-600 mt-0.5">${v.hookExplain}</p>
                            </div>
                            <div>
                                <span class="font-bold text-gray-900 block">Робота гормону (${v.hormoneLabel}):</span>
                                <p class="text-gray-600 mt-0.5">${v.hormoneExplain}</p>
                            </div>
                            <div class="bg-gray-50 p-2 rounded border border-gray-200 relative">
                                <span class="font-bold text-indigo-900 block mb-1">Текст для зйомки:</span>
                                <p class="text-gray-800 italic select-all" id="script-${v.id}">${v.scriptText}</p>
                                <button onclick="copyScript('script-${v.id}', this)" class="absolute top-1 right-1 bg-white hover:bg-gray-100 border border-gray-300 rounded px-1.5 py-0.5 text-[10px] font-medium transition">Копіювати</button>
                            </div>
                            <div>
                                <span class="font-bold text-green-700 block">Заклик до дії (CTA):</span>
                                <p class="font-medium text-gray-900 mt-0.5">${v.cta}</p>
                            </div>
                        </div>
                    </details>
                `;
                container.appendChild(card);
            });
        }

        // Функція копіювання тексту
        function copyScript(elementId, button) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.innerText;
                button.innerText = 'Скопійовано!';
                button.classList.add('bg-green-100', 'text-green-700', 'border-green-300');
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove('bg-green-100', 'text-green-700', 'border-green-300');
                }, 1500);
            });
        }

        // Фільтрація за нішами
        function filterNiche(niche) {
            // Оновлення активної кнопки
            const buttons = document.querySelectorAll('header button');
            buttons.forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            event.target.classList.remove('bg-gray-200', 'text-gray-700');
            event.target.classList.add('bg-indigo-600', 'text-white');

            if(niche === 'all') {
                renderVideos(videos);
            } else {
                const filtered = videos.filter(v => v.niche === niche);
                renderVideos(filtered);
            }
        }

        // Живий пошук
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = videos.filter(v => 
                v.hook.toLowerCase().includes(query) || 
                v.scriptText.toLowerCase().includes(query) ||
                v.nicheLabel.toLowerCase().includes(query)
            );
            renderVideos(filtered);
        });

        // Перший запуск сторінки
        renderVideos(videos);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">

<style>
:root{
  --purple-900:#2E1065;
  --purple-700:#5B21B6;
  --purple-600:#6D28D9;
  --purple-500:#7B2FF7;
  --purple-400:#9D5CF9;
  --purple-100:#F1EAFE;
  --purple-50:#F7F5FD;
  --gold-500:#E3A419;
  --gold-100:#FDF1DA;
  --ink-900:#181120;
  --ink-700:#3A3348;
  --ink-500:#6B647C;
  --ink-300:#A69FB5;
  --line:#E8E3F5;
  --bg:#F6F4FB;
  --card:#FFFFFF;
  --green:#16A34A;
  --green-100:#E6F7EC;
  --red:#DC2626;
  --red-100:#FDEAEA;
  --amber:#D97706;
  --radius:16px;
  --radius-sm:10px;
  --shadow-card: 0 1px 2px rgba(24,17,32,0.04), 0 8px 24px -12px rgba(46,16,101,0.10);
  --shadow-pop: 0 20px 60px -12px rgba(46,16,101,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink-900);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4,.font-display{font-family:'Manrope',sans-serif;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--purple-100);}

/* ---------- Star glyph ---------- */
.star{color:var(--gold-500);}

/* ---------- App shell (mobile-first: single column by default) ---------- */
.app{display:flex;flex-direction:column;min-height:100vh;}
@media (min-width:900px){
  .app{flex-direction:row;}
}

/* ---------- Sidebar (hidden on mobile — topbar nav takes over) ---------- */
.sidebar{display:none;}
@media (min-width:900px){
  .sidebar{
    width:248px;
    flex-shrink:0;
    background:linear-gradient(180deg,var(--purple-900) 0%, #1E0B47 100%);
    color:#fff;
    display:flex;
    flex-direction:column;
    padding:22px 14px;
    position:sticky;
    top:0;
    height:100vh;
  }
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 10px 22px 10px;
}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--purple-400),var(--gold-500));
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  flex-shrink:0;
}
.brand-text .name{font-family:'Manrope',sans-serif;font-weight:800;font-size:15.5px;letter-spacing:.2px;}
.brand-text .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}

.nav-group-label{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.38);
  margin:14px 12px 6px;
  font-weight:700;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;
  border-radius:11px;
  color:rgba(255,255,255,.72);
  font-size:13.6px;font-weight:600;
  margin-bottom:2px;
  transition:background .15s, color .15s;
  position:relative;
  border:none;background:transparent;width:100%;text-align:left;
}
.nav-item .ic{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-item .who{
  margin-left:auto;font-size:9.5px;font-weight:700;text-transform:uppercase;
  padding:2px 6px;border-radius:99px;letter-spacing:.03em;
  background:rgba(255,255,255,.10);color:rgba(255,255,255,.55);
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.14);color:#fff;}
.nav-item.active::before{
  content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;
  background:var(--gold-500);border-radius:0 4px 4px 0;
}
.nav-item.active .who{background:var(--gold-500);color:#3A2400;}

.sidebar-foot{
  margin-top:auto;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  font-size:11.5px;
  color:rgba(255,255,255,.55);
  line-height:1.5;
}
.sidebar-foot b{color:rgba(255,255,255,.85);}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:rgba(246,244,251,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;
}
.topbar-brand{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px 0;font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;color:var(--purple-700);
}
@media (min-width:900px){ .topbar-brand{display:none;} }

/* Role switcher — mobile-first: full-width scroll row of 3 big tabs */
.role-switch{
  display:flex;gap:6px;
  padding:10px 12px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.role-switch::-webkit-scrollbar{display:none;}
.role-btn{
  flex:1;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 10px;border-radius:11px;
  border:1px solid var(--line);background:#fff;
  font-size:12.5px;font-weight:700;color:var(--ink-500);
  white-space:nowrap;transition:all .15s;
}
.role-btn .rb-ic{font-size:14px;}
.role-btn.active{
  background:var(--purple-500);border-color:var(--purple-500);color:#fff;
  box-shadow:0 6px 16px -6px rgba(123,47,247,.55);
}
.role-btn.active.role-blogger{background:var(--gold-500);border-color:var(--gold-500);box-shadow:0 6px 16px -6px rgba(227,164,25,.5);}
.role-btn.active.role-buyer{background:var(--green);border-color:var(--green);box-shadow:0 6px 16px -6px rgba(22,163,74,.45);}

/* Sub-nav chips — the views available within the selected role */
.subnav{
  display:flex;gap:8px;
  padding:0 12px 12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.subnav::-webkit-scrollbar{display:none;}
.subnav-chip{
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:99px;
  border:1px solid var(--line);background:#fff;
  font-size:12.5px;font-weight:600;color:var(--ink-700);
}
.subnav-chip.active{border-color:var(--purple-400);background:var(--purple-50);color:var(--purple-600);}

@media (min-width:900px){
  .role-switch{padding:14px 32px 0;max-width:520px;gap:8px;}
  .subnav{padding:10px 32px 14px;}
}

.view{display:none;padding:20px 16px 50px;max-width:1240px;}
@media (min-width:900px){
  .view{padding:28px 32px 60px;}
}
.view.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.view-head{margin-bottom:22px;}
.view-head .eyebrow{
  font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--purple-500);display:flex;align-items:center;gap:6px;margin-bottom:6px;
}
.view-head h1{font-size:26px;font-weight:800;margin:0 0 6px;letter-spacing:-.01em;}
.view-head p{font-size:13.6px;color:var(--ink-500);margin:0;max-width:620px;line-height:1.55;}

/* ---------- Generic ---------- */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-card);
}
.btn{
  display:inline-flex;align-items:center;gap:6px;justify-content:center;
  padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;
  border:1px solid transparent;transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--purple-500);color:#fff;}
.btn-primary:hover{background:var(--purple-600);}
.btn-ghost{background:#fff;color:var(--ink-700);border-color:var(--line);}
.btn-ghost:hover{border-color:var(--purple-400);color:var(--purple-600);}
.btn-soft{background:var(--purple-50);color:var(--purple-600);}
.btn-soft:hover{background:var(--purple-100);}
.btn-danger{background:var(--red-100);color:var(--red);}
.btn-danger:hover{background:#fbd6d6;}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;
}
.badge-green{background:var(--green-100);color:var(--green);}
.badge-gold{background:var(--gold-100);color:#8A5A00;}
.badge-purple{background:var(--purple-100);color:var(--purple-600);}
.badge-gray{background:#F1EFF7;color:var(--ink-500);}
.badge-red{background:var(--red-100);color:var(--red);}

.avatar{
  border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--purple-100);
}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--ink-900);color:#fff;padding:12px 18px;border-radius:12px;
  font-size:13px;font-weight:600;box-shadow:var(--shadow-pop);
  display:flex;align-items:center;gap:9px;
  animation:toastIn .25s ease;
  max-width:320px;
}
.toast .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.modal-overlay{
  position:fixed;inset:0;background:rgba(24,17,32,.5);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-overlay.active{display:flex;}
.modal{
  background:#fff;border-radius:20px;max-width:520px;width:100%;
  box-shadow:var(--shadow-pop);max-height:88vh;overflow:auto;
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{padding:20px 22px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;}
.modal-head h3{margin:0;font-size:17px;font-weight:800;}
.modal-head p{margin:4px 0 0;font-size:12.5px;color:var(--ink-500);}
.modal-close{margin-left:auto;background:#F1EFF7;border:none;width:28px;height:28px;border-radius:50%;font-size:14px;color:var(--ink-500);flex-shrink:0;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#D9D3EC;border-radius:99px;}
::-webkit-scrollbar-track{background:transparent;}

.hint-banner{
  display:flex;gap:12px;align-items:flex-start;
  background:var(--purple-50);border:1px solid var(--purple-100);
  border-radius:14px;padding:14px 16px;margin-bottom:20px;font-size:12.8px;color:var(--ink-700);line-height:1.5;
}
.hint-banner .ic{color:var(--purple-500);font-size:16px;flex-shrink:0;margin-top:1px;}

/* ---------- Info FAB (top-right "i" — always visible, opens system-logic explainer) ---------- */
.info-fab{
  position:fixed;top:10px;right:10px;z-index:50;
  width:34px;height:34px;border-radius:50%;
  background:#fff;border:1.5px solid var(--purple-300, var(--purple-400));
  color:var(--purple-600);font-family:'Manrope',sans-serif;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px -6px rgba(46,16,101,.35);
  transition:transform .15s, box-shadow .15s;
}
.info-fab:hover{transform:scale(1.07);box-shadow:0 8px 22px -6px rgba(46,16,101,.45);}
@media (min-width:900px){
  .info-fab{top:16px;right:20px;width:38px;height:38px;font-size:16px;}
}

/* ---------- Mobile-first responsive tables (card layout below 640px) ---------- */
.resp-table{width:100%;border-collapse:collapse;font-size:13px;}
.resp-table th{text-align:left;font-size:10.8px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-300);font-weight:700;padding:0 14px 10px;border-bottom:1px solid var(--line);}
.resp-table td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
.resp-table tr:last-child td{border-bottom:none;}
@media (max-width:640px){
  .resp-table thead{position:absolute;left:-9999px;top:-9999px;}
  .resp-table, .resp-table tbody, .resp-table tr, .resp-table td{display:block;width:100%;}
  .resp-table tr{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:10px 12px;background:#fff;}
  .resp-table td{border-bottom:1px dashed var(--line);padding:8px 2px 8px 46%;position:relative;text-align:right;min-height:20px;}
  .resp-table td:last-child{border-bottom:none;}
  .resp-table td::before{
    content:attr(data-label);
    position:absolute;left:2px;top:8px;width:44%;
    text-align:left;font-size:10.8px;font-weight:700;color:var(--ink-500);
    text-transform:uppercase;letter-spacing:.03em;
  }
  .resp-table td[data-label=""]::before{content:none;}
}
</style>
</head>

    <!-- ===================== VIEW: STORE (seller) ===================== -->
    <section class="view active" id="view-store"></section>

    <!-- ===================== VIEW: BLOGGER (creator profile) ===================== -->
    <section class="view" id="view-blogger"></section>

    <!-- ===================== VIEW: APPLICATION (seller inbox) ===================== -->
    <section class="view" id="view-application"></section>

    <!-- ===================== VIEW: REQUEST (blogger search) ===================== -->
    <section class="view" id="view-request"></section>

    <!-- ===================== VIEW: ORDERS (blogger) ===================== -->
    <section class="view" id="view-orders"></section>

    <!-- ===================== VIEW: CART (buyer) ===================== -->
    <section class="view" id="view-cart"></section>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- FIXATION MODAL -->
<div class="modal-overlay" id="fixationModal">
  <div class="modal" id="fixationModalContent"></div>
</div>

<!-- GENERIC DETAIL MODAL (blogger full profile from within lists) -->
<div class="modal-overlay" id="profileModal">
  <div class="modal" id="profileModalContent" style="max-width:640px;"></div>
</div>

<!-- INFO MODAL: how Дзеркало works -->
<div class="modal-overlay" id="infoModal">
  <div class="modal" id="infoModalContent" style="max-width:820px;"></div>
</div>

<script>
/* ============================================================
   ДЗЕРКАЛО — рендер екранів
   ============================================================ */

function fmt(n){ return n.toLocaleString('uk-UA'); }

function initials(name){
  return name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
}

function avatarHtml(name, bg, size){
  size = size || 44;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};display:flex;align-items:center;justify-content:center;font-weight:800;color:#5B2E85;font-size:${size*0.36}px;font-family:'Manrope',sans-serif;">${initials(name)}</div>`;
}

function statusBadge(status){
  const map = {
    active: `<span class="badge badge-green">● активна співпраця</span>`,
    paused: `<span class="badge badge-gray">⏸ на паузі</span>`,
    delivered: `<span class="badge badge-green">Доставлено</span>`,
    shipped: `<span class="badge badge-purple">В дорозі</span>`,
    processing: `<span class="badge badge-gold">Обробляється</span>`,
    returned: `<span class="badge badge-red">Повернення</span>`
  };
  return map[status] || '';
}

/* -------- Signature component: Star ledger -------- */
function starLedger(blogger, opts){
  opts = opts || {};
  const newStars = blogger.lastFixation ? blogger.storeStars - blogger.lastFixation.stars : blogger.storeStars;
  const pct = blogger.storeStars > 0 ? Math.min(100, Math.round((newStars / Math.max(blogger.storeStars,1)) * 100)) : 0;
  const timeline = (blogger.fixations||[]).slice(-4).map(f => `
    <div class="fx-point" title="Фіксація №${f.number}: ${fmt(f.stars)} ★ від ${f.date}">
      <div class="fx-dot"></div>
      <div class="fx-num">№${f.number}</div>
      <div class="fx-stars">${fmt(f.stars)}★</div>
    </div>
  `).join('<div class="fx-line"></div>');

  return `
  <div class="ledger">
    <div class="ledger-row">
      <div class="ledger-metric">
        <div class="lm-label">Загальні зірочки блогера</div>
        <div class="lm-value">${fmt(blogger.totalStars)} <span class="star">★</span></div>
        <div class="lm-note">за всі магазини, за весь час — не обнуляються</div>
      </div>
      <div class="ledger-metric accent">
        <div class="lm-label">Зірочки по цьому магазину</div>
        <div class="lm-value">${fmt(blogger.storeStars)} <span class="star">★</span></div>
        <div class="lm-note">використовуються для взаєморозрахунку</div>
      </div>
    </div>

    <div class="ledger-new">
      <div class="ln-top">
        <span>Нових зірочок після останньої фіксації</span>
        <b>+${fmt(newStars)} ★</b>
      </div>
      <div class="ln-bar"><div class="ln-fill" style="width:${pct}%"></div></div>
      <div class="ln-sub">${blogger.lastFixation ? `Остання фіксація №${blogger.lastFixation.number} · ${fmt(blogger.lastFixation.stars)}★ · ${blogger.lastFixation.date}` : 'Фіксацій ще не було'}</div>
    </div>

    ${timeline ? `<div class="fx-timeline">${timeline}</div>` : ''}

    ${opts.showAction !== false ? `
    <div class="ledger-actions">
      <button class="btn btn-primary btn-sm" onclick="openFixation('${blogger.id}')">Запросити фіксацію</button>
      <button class="btn btn-ghost btn-sm" onclick="showToast('Історію фіксацій відкрито (демо)')">Історія</button>
    </div>` : ''}
  </div>`;
}

const LEDGER_STYLE = `

</script>
<script>
/* ============================================================
   ДЗЕРКАЛО — логіка прототипу
   ============================================================ */

const ROLES = [
  { key:'seller',  label:'Продавець', icon:'🏬', views:['store','application'] },
  { key:'blogger', label:'Блогер',    icon:'🎥', views:['blogger','request','orders'] },
  { key:'buyer',   label:'Покупець',  icon:'🛒', views:['cart'] }
];

const VIEW_META = {
  store:       { title: "Магазин",    icon:'🏬', roleKey: "seller" },
  blogger:     { title: "Блогер",     icon:'🎥', roleKey: "blogger" },
  application: { title: "Заявки",     icon:'📝', roleKey: "seller" },
  request:     { title: "Запит",      icon:'🤝', roleKey: "blogger" },
  orders:      { title: "Замовлення", icon:'📦', roleKey: "blogger" },
  cart:        { title: "Кошик",      icon:'🛒', roleKey: "buyer" }
};

function renderRoleSwitch(activeRoleKey){
  document.getElementById('roleSwitch').innerHTML = ROLES.map(r => `
    <button class="role-btn ${r.key === activeRoleKey ? 'active role-' + r.key : ''}" onclick="selectRole('${r.key}')">
      <span class="rb-ic">${r.icon}</span>${r.label}
    </button>
  `).join('');
}

function renderSubNav(roleKey, activeView){
  const role = ROLES.find(r => r.key === roleKey);
  document.getElementById('subNav').innerHTML = role.views.map(v => `
    <button class="subnav-chip ${v === activeView ? 'active' : ''}" onclick="selectView('${v}')">
      ${VIEW_META[v].icon} ${VIEW_META[v].title}
    </button>
  `).join('');
}

/* selectRole: jump to the first (or most recently viewed) screen in that role */
const lastViewByRole = {};
function selectRole(roleKey){
  const role = ROLES.find(r => r.key === roleKey);
  selectView(lastViewByRole[roleKey] || role.views[0]);
}

/* selectView: single source of truth for switching screens — keeps sidebar,
   role tabs and subnav chips all in sync, wherever the click came from. */
function selectView(viewName){
  const meta = VIEW_META[viewName];
  if (!meta) return;
  lastViewByRole[meta.roleKey] = viewName;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + viewName).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const navBtn = document.querySelector(`.nav-item[data-view="${viewName}"]`);
  if (navBtn) navBtn.classList.add('active');

  renderRoleSwitch(meta.roleKey);
  renderSubNav(meta.roleKey, viewName);

  window.scrollTo({top:0, behavior:'instant'});
}

/* kept as an alias so any legacy calls still work */
function switchView(viewName){ selectView(viewName); }

/* -------- Toasts -------- */
function showToast(msg){
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span class="dot"></span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .3s, transform .3s';
    t.style.opacity = '0';
    t.style.transform = 'translateY(6px)';
    setTimeout(() => t.remove(), 300);
  }, 3200);
}

/* -------- Application accordion -------- */
function toggleApp(id){
  document.getElementById('acc-' + id).classList.toggle('open');
}

/* -------- Cart detail accordion -------- */
function toggleCartDetail(idx){
  document.getElementById('cs-detail-' + idx).classList.toggle('open');
}

/* -------- Cart checkout (per-store + sequential "one by one") -------- */
const cartCheckedOut = new Set();
let cartProcessing = false;

function checkoutStore(idx){
  if (cartProcessing || cartCheckedOut.has(idx)) return;
  cartCheckedOut.add(idx);
  showToast(`Замовлення для «${CART[idx].store}» оформлено окремо ✓`);
  renderCartView();
}

function checkoutAllSequential(){
  if (cartProcessing) return;
  const pending = CART.map((_, i) => i).filter(i => !cartCheckedOut.has(i));
  if (pending.length === 0) return;

  cartProcessing = true;
  renderCartView();

  const step = (n) => {
    if (n >= pending.length){
      cartProcessing = false;
      showToast(`Усі ${CART.length} замовлення оформлено окремо для кожного магазину ✓`);
      renderCartView();
      return;
    }
    const idx = pending[n];
    cartCheckedOut.add(idx);
    showToast(`(${n+1}/${pending.length}) Оформлено замовлення для «${CART[idx].store}»`);
    renderCartView();
    setTimeout(() => step(n+1), 700);
  };
  step(0);
}

/* -------- Request form -------- */
function openRequestForm(storeId){
  const store = SEARCH_STORES.find(s => s.id === storeId);
  document.getElementById('reqFormStoreName').textContent = store ? store.name + ' · ' + store.category : '—';
  const wrap = document.getElementById('requestFormWrap');
  wrap.classList.add('open');
  wrap.scrollIntoView({behavior:'smooth', block:'start'});
}
function closeRequestForm(){
  document.getElementById('requestFormWrap').classList.remove('open');
}
function submitRequest(){
  closeRequestForm();
  showToast('Заявку надіслано продавцю. Очікуйте підтвердження ✓');
}

/* Radio-card single-select within a group */
document.addEventListener('click', (e) => {
  const card = e.target.closest('.radio-card');
  if (!card) return;
  const group = card.parentElement;
  group.querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
});

      .fc-box.accent{background:var(--purple-50);border-color:var(--purple-100);}
      .fc-label{font-size:10.8px;color:var(--ink-500);font-weight:600;margin-bottom:6px;}

      .fc-sub{font-size:10.5px;color:var(--ink-300);margin-top:4px;}
      .fc-arrow{font-size:18px;color:var(--ink-300);}
      .fix-steps{display:flex;flex-direction:column;gap:8px;}
      .fix-step{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-300);}
      .fix-step.done{color:var(--ink-700);font-weight:600;}
      .fix-step.active{color:var(--purple-600);font-weight:700;}
      .fs-dot{width:20px;height:20px;border-radius:50%;background:#EDE9F7;color:var(--ink-500);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
      .fix-step.done .fs-dot{background:var(--green);color:#fff;}
      .fix-step.active .fs-dot{background:var(--purple-500);color:#fff;}
    </style>
  `;
  document.getElementById('fixationModalContent').innerHTML = content;
  document.getElementById('fixationModal').classList.add('active');
  setTimeout(() => document.getElementById('fixStep2')?.classList.add('active'), 200);
}

function closeFixation(){
  document.getElementById('fixationModal').classList.remove('active');
}

function confirmFixation(bloggerId){
  const b = STORE_BLOGGERS.find(x => x.id === bloggerId);
  if (!b) return closeFixation();

  document.getElementById('fixStep2')?.classList.remove('active');
  document.getElementById('fixStep2')?.classList.add('done');
  document.getElementById('fixStep3')?.classList.add('active');
  const btn = document.getElementById('fixConfirmBtn');
  btn.disabled = true;
  btn.textContent = 'Записуємо у журнал…';

  setTimeout(() => {
    const newNum = (b.fixations[b.fixations.length-1]?.number || 0) + 1;
    const today = new Date().toLocaleDateString('uk-UA');
    const entry = { number: newNum, stars: b.storeStars, date: today };
    b.fixations.push(entry);
    b.lastFixation = entry;

    document.getElementById('fixStep3')?.classList.remove('active');
    document.getElementById('fixStep3')?.classList.add('done');
    btn.textContent = 'Зафіксовано ✓';

    setTimeout(() => {
      closeFixation();
      showToast(`Фіксація №${newNum} для ${b.name}: ${fmt(entry.stars)} ★ записано в журнал`);
      // Re-render whichever views could show this data
      if (document.getElementById('view-store').classList.contains('active')) renderStoreView();
      if (document.getElementById('view-blogger').classList.contains('active')) renderBloggerView();
    }, 700);
  }, 900);
}

        font-family:'Manrope',sans-serif;font-weight:800;font-size:17px;
      }
      .info-content{font-size:13px;line-height:1.6;}
      .ic-lead{font-size:13.2px;color:var(--ink-700);margin:0 0 18px;}
      .ic-section-title{
        font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;
        color:var(--purple-500);margin:22px 0 10px;padding-top:14px;border-top:1px solid var(--line);
      }
      .info-content > .ic-section-title:first-of-type{border-top:none;padding-top:0;}

      .ic-roles{display:flex;flex-direction:column;gap:10px;align-items:stretch;margin-bottom:6px;}
      .ic-role{flex:1;background:var(--purple-50);border:1px solid var(--purple-100);border-radius:14px;padding:14px;text-align:center;}
      .ic-role-ic{font-size:22px;margin-bottom:6px;}
      .ic-role-name{font-weight:800;font-family:'Manrope',sans-serif;font-size:13.5px;margin-bottom:4px;}
      .ic-role-desc{font-size:11.5px;color:var(--ink-500);line-height:1.45;}
      .ic-role-arrow{text-align:center;font-size:16px;color:var(--purple-300,var(--purple-400));}

      .ic-flow{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
      .ic-flow-step{
        display:flex;align-items:center;gap:10px;
        background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--ink-700);
      }
      .ic-flow-step.accent{border-color:var(--purple-200,var(--purple-100));background:var(--purple-50);color:var(--purple-600);}
      .ic-fs-n{
        width:20px;height:20px;border-radius:50%;background:var(--purple-100);color:var(--purple-600);
        display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;
      }
      .ic-flow-step.accent .ic-fs-n{background:var(--purple-500);color:#fff;}
      .ic-flow-arrow{text-align:center;font-size:13px;color:var(--ink-300);}

      .ic-notdoes{display:flex;flex-direction:column;gap:10px;}
      .ic-nd-col{border-radius:12px;padding:12px 14px;font-size:12.5px;}
      .ic-nd-col.bad{background:var(--red-100);}
      .ic-nd-col.good{background:var(--green-100);}
      .ic-nd-head{font-weight:800;margin-bottom:6px;font-size:12.5px;}
      .ic-nd-col ul{margin:0;padding-left:18px;}
      .ic-nd-col li{margin-bottom:3px;}
      .ic-note{font-size:12px;color:var(--ink-500);margin:10px 0 0;}

      .ic-stars{display:flex;flex-direction:column;gap:10px;}
      .ic-star-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;}
      .ic-star-card.accent{background:var(--purple-50);border-color:var(--purple-100);}
      .ic-star-note{font-size:11px;color:var(--ink-300);margin-top:5px;line-height:1.4;}

      .ic-fixation-demo{display:flex;flex-direction:column;gap:8px;align-items:stretch;margin-top:6px;}
      .ic-fd-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;}
      .ic-fd-box.accent{background:var(--purple-50);border-color:var(--purple-100);}
      .ic-fd-box b{display:block;font-size:18px;font-family:'Manrope',sans-serif;}
      .ic-fd-box span{font-size:10.8px;color:var(--ink-500);}
      .ic-fd-arrow{text-align:center;font-size:11.5px;color:var(--ink-300);font-style:italic;}
      .ic-fixation-result{margin-top:10px;font-size:12.5px;background:var(--gold-100);color:#7A4F00;border-radius:10px;padding:10px 12px;}

      .ic-screens{display:flex;flex-direction:column;gap:8px;}
      .ic-screen-row{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-700);font-weight:600;}

      @media (min-width:640px){
        .ic-roles{flex-direction:row;align-items:center;}
        .ic-role-arrow{transform:none;}
        .ic-flow{flex-direction:row;flex-wrap:wrap;align-items:center;}
        .ic-flow-step{flex:1 1 150px;}
        .ic-flow-arrow{flex:0 0 auto;}
        .ic-notdoes{flex-direction:row;}
        .ic-nd-col{flex:1;}
        .ic-stars{flex-direction:row;}
        .ic-star-card{flex:1;}
        .ic-fixation-demo{flex-direction:row;align-items:center;}
        .ic-fd-box{flex:1;}
        .ic-fd-arrow{flex:0 0 140px;}
      }
    </style>
  `;
  document.getElementById('infoModalContent').innerHTML = content;
  document.getElementById('infoModal').classList.add('active');
}
function closeInfo(){
  document.getElementById('infoModal').classList.remove('active');
}

/* -------- Close modals on overlay click -------- */
document.getElementById('fixationModal').addEventListener('click', (e) => {
  if (e.target.id === 'fixationModal') closeFixation();
});
document.getElementById('profileModal').addEventListener('click', (e) => {
  if (e.target.id === 'profileModal') document.getElementById('profileModal').classList.remove('active');
});
document.getElementById('infoModal').addEventListener('click', (e) => {
  if (e.target.id === 'infoModal') closeInfo();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape'){
    closeFixation();
    document.getElementById('profileModal').classList.remove('active');
    closeInfo();
  }
});

/* -------- Init -------- */
renderStoreView();
renderBloggerView();
renderApplicationView();
renderRequestView();
renderOrdersView();
renderCartView();
selectView('store');

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>CRM Товар</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 12px;
    background: #fff;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #cfe8ff;
    border: none;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.tag {
    padding: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.tag.active {
    background: #cfe8ff;
}

.variant {
    border: 1px solid #eee;
    padding: 10px;
    margin-top: 10px;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: none;
    overflow: auto;
    padding: 15px;
}

.color {
    width: 30%;
    text-align: center;
    padding: 10px;
    border: 2px solid;
}

.beige { border-color: #d6c2a6 }
.black { border-color: #000 }
.white { border-color: #ccc }
.tiffany { border-color: #0abab5 }
.smaragd { border-color: #50c878 }
.red { border-color: #ff0000 }
.blue { border-color: #0000ff }
.gray { border-color: #888 }
.pink { border-color: #ff69b4 }
.brown { border-color: #8b4513 }

.highlight {
    background: #a8d8ff;
}
</style>

</head>

<body>

<h3>Додати товар</h3>

<input placeholder="Назва товару">
<input placeholder="SKU">
<input placeholder="Ціна">
<input placeholder="Кількість">

<select>
<option>Одяг</option>
<option>Взуття</option>
<option>Аксесуари</option>
<option>Косметика</option>
<option>Електроніка</option>
</select>

<select>
<option>Светри</option>
<option>Штани</option>
<option>Футболки</option>
<option>Куртки</option>
<option>Сукні</option>
</select>

<label><input type="checkbox"> Тягнеться (стрейч)</label>

<button onclick="toggleMulti()">Декілька товарів</button>

<div id="multi" style="display:none">

<h4>Розміри</h4>
<div class="grid" id="sizes"></div>

<h4>Кольори</h4>
<div class="grid">
<div class="color beige" onclick="toggle(this)">Beige</div>
<div class="color black" onclick="toggle(this)">Black</div>
<div class="color white" onclick="toggle(this)">White</div>
<div class="color tiffany" onclick="toggle(this)">Tiffany</div>
<div class="color smaragd" onclick="toggle(this)">Smaragd</div>
<div class="color red" onclick="toggle(this)">Red</div>
<div class="color blue" onclick="toggle(this)">Blue</div>
<div class="color gray" onclick="toggle(this)">Gray</div>
<div class="color pink" onclick="toggle(this)">Pink</div>
<div class="color brown" onclick="toggle(this)">Brown</div>
</div>

<div id="variants"></div>

</div>

<textarea placeholder="Опис"></textarea>

<button class="highlight" onclick="openExtra()">Внести додаткові характеристики</button>

<label><input type="checkbox"> Відправити в бот</label>
<label><input type="checkbox"> Топ товар</label>

<button>Зберегти</button>
<button>Зберегти і ще</button>
<button>Скасувати</button>

<!-- МОДАЛКА ЗАМІРІВ -->
<div class="modal" id="measureModal">
<h3>Заміри</h3>

<label><input type="checkbox"> Напівоб'єм</label>

<input placeholder="ОГ">
<input placeholder="ОБ">
<input placeholder="Талія">
<input placeholder="Довжина">
<input placeholder="Рукав">

<label><input type="checkbox"> Тягнеться</label>

<button onclick="closeModal()">Зберегти</button>
</div>

<!-- ДОДАТКОВІ -->
<div class="modal" id="extraModal">
<h3>Додаткові характеристики</h3>

<select>
<option>Китай</option>
<option>Туреччина</option>
<option>Італія</option>
<option>Польща</option>
<option>Україна</option>
</select>

<h4>Матеріал</h4>

<div class="grid">
<div class="tag" onclick="toggle(this)">Бавовна</div>
<div class="tag" onclick="toggle(this)">Поліестер</div>
<div class="tag" onclick="toggle(this)">Еластан</div>
<div class="tag" onclick="toggle(this)">Вовна</div>
<div class="tag" onclick="toggle(this)">Льон</div>
</div>

<input placeholder="% матеріалу">

<button onclick="closeExtra()">Зберегти</button>
</div>

<script>

// sizes generate
let sizes = ["XXS","XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];
let sizesDiv = document.getElementById("sizes");

sizes.forEach(s=>{
    let el = document.createElement("div");
    el.className="tag";
    el.innerText=s;
    el.onclick=()=>toggle(el);
    sizesDiv.appendChild(el);
});

function toggle(el){
    el.classList.toggle("active");
    renderVariants();
}

function toggleMulti(){
    document.getElementById("multi").style.display="block";
}

function renderVariants(){
    let selectedSizes = [...document.querySelectorAll("#sizes .active")].map(e=>e.innerText);
    let selectedColors = [...document.querySelectorAll(".color.active")].map(e=>e.innerText);

    let box = document.getElementById("variants");
    box.innerHTML="";

    selectedSizes.forEach(s=>{
        selectedColors.forEach(c=>{
            let v = document.createElement("div");
            v.className="variant";

            v.innerHTML=`
            <b>${s} / ${c}</b>
            <input placeholder="Кількість">
            <input placeholder="Ціна">
            <button onclick="openModal()">Внести заміри</button>
            `;

            box.appendChild(v);
        });
    });
}

function openModal(){
    document.getElementById("measureModal").style.display="block";
}

function closeModal(){
    document.getElementById("measureModal").style.display="none";
}

function openExtra(){
    document.getElementById("extraModal").style.display="block";
}

function closeExtra(){
    document.getElementById("extraModal").style.display="none";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial;
    margin: 0;
    padding: 10px;
    background: #fff;
}

.container {
    max-width: 480px;
    margin: auto;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    background: #cfe8ff;
    font-size: 16px;
}

.small-btn {
    padding: 10px;
    font-size: 14px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.tag {
    flex: 1 0 22%;
    text-align: center;
    padding: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.tag.active {
    background: #cfe8ff;
}

.info {
    font-size: 14px;
    margin-top: 10px;
}

.modal {
    position: fixed;
    inset: 0;
    background: #fff;
    display: none;
    overflow-y: auto;
    padding: 15px;
}

.header {
    font-weight: bold;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="container">

<h3>Додати товар</h3>

<input placeholder="Назва товару">
<input placeholder="SKU">
<input placeholder="Ціна">
<input placeholder="Кількість">

<select>
<option>Одяг</option>
<option>Взуття</option>
<option>Аксесуари</option>
<option>Косметика</option>
<option>Електроніка</option>
</select>

<select>
<option>Светри</option>
<option>Штани</option>
<option>Футболки</option>
<option>Куртки</option>
<option>Сукні</option>
</select>

<label>
<input type="checkbox" id="stretchToggle"> Тягнеться (Stretch)
</label>

<button onclick="toggleMulti()">Декілька розмірів</button>

<div id="multiBlock" style="display:none">

<div class="header">Активуйте наявні розміри</div>

<div class="grid" id="sizes"></div>

<div class="info" id="infoText">
Ви обрали: 0 розмірів
</div>

<button onclick="openModal()">Внести заміри</button>

</div>

<textarea placeholder="Опис"></textarea>

<button style="background:#a8d8ff">Внести додаткові характеристики</button>

<label><input type="checkbox"> Відправити в бот</label>
<label><input type="checkbox"> Топ товар</label>

<button>Зберегти</button>
<button>Зберегти і ще</button>
<button>Скасувати</button>

</div>

<!-- МОДАЛКА -->
<div class="modal" id="modal">

<h3>Внесіть заміри</h3>

<div id="measureFields"></div>

<button onclick="closeModal()">Зберегти</button>

</div>

<script>

let sizes = ["XXS","XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];
let selected = [];

let sizesDiv = document.getElementById("sizes");

sizes.forEach(s=>{
    let el = document.createElement("div");
    el.className = "tag";
    el.innerText = s;

    el.onclick = () => {
        el.classList.toggle("active");

        selected = [...document.querySelectorAll(".tag.active")].map(e=>e.innerText);

        document.getElementById("infoText").innerText =
        `Ви обрали: ${selected.length} розмірів | Заповнено: 0`;

    };

    sizesDiv.appendChild(el);
});

function toggleMulti(){
    document.getElementById("multiBlock").style.display = "block";
}

function openModal(){

    let box = document.getElementById("measureFields");
    box.innerHTML = "";

    let stretch = document.getElementById("stretchToggle").checked;

    selected.forEach(size=>{
        let div = document.createElement("div");

        div.innerHTML = `
        <hr>
        <b>${size}</b>
        <input placeholder="ОГ">
        <input placeholder="ОБ">
        <input placeholder="Талія">
        <input placeholder="Довжина">

        ${stretch ? `
        <input placeholder="Тягнеться від">
        <input placeholder="Тягнеться до">
        ` : ``}
        `;

        box.appendChild(div);
    });

    document.getElementById("modal").style.display = "block";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>

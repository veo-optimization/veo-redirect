<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>Create New Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        html { overflow-x: hidden; }
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        .form-container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 400px) {
            .form-row { grid-template-columns: 1fr; }
        }
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: #999;
        }
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .form-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: #7c3aed;
            cursor: pointer;
        }
        .form-checkbox span {
            font-size: 0.95rem;
            color: #444;
        }
        .media-upload {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .media-upload:hover {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.04);
        }
        .media-upload input[type="file"] {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
        }
        .media-upload-icon {
            font-size: 2rem;
            color: #999;
            margin-bottom: 8px;
        }
        .media-upload-text {
            font-size: 0.95rem;
            color: #666;
        }
        .media-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
        }
        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-cancel {
            background: #e5e5e5;
            color: #555;
        }
        .btn-cancel:hover { background: #d5d5d5; }
        .btn-save {
            background: #7c3aed;
            color: #fff;
        }
        .btn-save:hover { background: #6d28d9; }
        .btn-secondary {
            background: #e5e5e5;
            color: #555;
        }
        .btn-secondary:hover { background: #d5d5d5; }
        .btn i { margin-right: 6px; }
    </style>
</head>
<body>

<div class="form-container">
    <header class="page-header">
        <h1 class="page-title">Create New Product</h1>
    </header>

    <form id="productForm" action="#" method="post">
        <!-- 1. SKU -->
        <div class="form-group">
            <label for="sku">SKU</label>
            <input type="text" id="sku" name="sku" class="form-input" value="8034" required>
        </div>

        <!-- 2. Product Name -->
        <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" name="productName" class="form-input" value="Футболка біла" required>
        </div>

        <!-- 3. Price & 4. Quantity -->
        <div class="form-row">
            <div class="form-group">
                <label for="price">Price</label>
                <input type="number" id="price" name="price" class="form-input" placeholder="Enter price" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" class="form-input" placeholder="Enter quantity" min="0" step="1">
            </div>
        </div>

        <!-- 5. Category -->
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" class="form-select">
                <option value="Жіночий одяг">Жіночий одяг</option>
                <option value="Чоловічий одяг">Чоловічий одяг</option>
                <option value="Взуття та аксесуари">Взуття та аксесуари</option>
                <option value="Дитячий одяг">Дитячий одяг</option>
            </select>
        </div>

        <!-- 6. Checkboxes -->
        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" name="sendToBot" id="sendToBot">
                <span>Відправити в бот</span>
            </label>
            <label class="form-checkbox">
                <input type="checkbox" name="isTop" id="isTop">
                <span>Топовий товар</span>
            </label>
        </div>

        <!-- 7. Media Upload -->
        <div class="form-group">
            <label>Медіа</label>
            <label class="media-upload" for="mediaInput">
                <input type="file" id="mediaInput" name="media" accept="image/*,video/*" multiple>
                <div class="media-upload-icon"><i class="bi bi-plus-lg"></i></div>
                <div class="media-upload-text">Додати медіа</div>
                <div class="media-hint">Зображення та відео</div>
            </label>
        </div>

        <!-- 8. Description -->
        <div class="form-group">
            <label for="description">Опис товару</label>
            <textarea id="description" name="description" class="form-textarea" placeholder="Опис товару..."></textarea>
        </div>

        <!-- 9. Action Buttons -->
        <div class="form-actions">
            <button type="button" class="btn btn-cancel">Скасувати</button>
            <button type="submit" class="btn btn-save"><i class="bi bi-save"></i> Зберегти</button>
            <button type="button" class="btn btn-secondary"><i class="bi bi-plus"></i> Додати ще</button>
            <button type="submit" name="saveAndAdd" class="btn btn-save">Зберегти і додати ще</button>
        </div>
    </form>
</div>

<script>
// UI prototype — backend logic will be implemented later
document.getElementById('productForm').addEventListener('submit', function(e) {
    e.preventDefault();
    console.log('Form submit (prototype)');
});
document.querySelector('.btn-cancel').addEventListener('click', function() {
    if (confirm('Скасувати?')) window.history.back();
});
</script>
</body>
</html>

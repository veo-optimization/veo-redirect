<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бриф міні-сайту</title>

<style>
:root {
    --main:#000;
    --bg:#f5f5f5;
    --card:#fff;
}

body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont;
    background:var(--bg);
}

.container {
    max-width:480px;
    margin:auto;
    padding:12px;
}

.card {
    background:var(--card);
    padding:14px;
    border-radius:18px;
    margin-bottom:10px;
}

h2 {text-align:center;}

label {
    font-size:14px;
    font-weight:600;
}

.hint {
    font-size:12px;
    color:#777;
    margin-bottom:6px;
}

input, textarea, select {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:16px;
    margin-bottom:10px;
}

.toggle {
    display:flex;
    gap:8px;
}

.toggle button {
    flex:1;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    background:#fff;
}

.toggle button.active {
    background:black;
    color:white;
}

.sticky {
    position:fixed;
    bottom:0;
    width:100%;
    max-width:480px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px;
    border-top:1px solid #eee;
}

.main-btn {
    width:100%;
    padding:16px;
    border-radius:14px;
    border:none;
    background:black;
    color:white;
    font-size:16px;
}

.hidden {display:none;}

.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.modal-content {
    background:white;
    margin:10% auto;
    padding:15px;
    width:90%;
    border-radius:14px;
}

pre {
    background:#111;
    color:#0f0;
    padding:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Міні-сайт</h2>

<div class="card">
<label>Назва магазину</label>
<div class="hint">Наприклад: VEO STORE</div>
<input id="shop">

<label>Посилання</label>
<div class="hint">латиниця: veo_store</div>
<input id="slug">
</div>

<div class="card">
<label>ПІБ ФОП</label>
<input id="fop">

<label>ЄДРПОУ</label>
<input id="edrpou" inputmode="numeric">

<label>IBAN</label>
<input id="iban">

<label>Банк</label>
<select id="bank">
<option>ПриватБанк</option>
<option>Монобанк</option>
<option>Інший</option>
</select>
<input id="bank_other" class="hidden" placeholder="Ваш банк">
</div>

<div class="card">
<label>TikTok</label>
<input id="tt_main" placeholder="Основний">
<input id="tt1" placeholder="Резерв 1">
<input id="tt2" placeholder="Резерв 2">
</div>

<div class="card">
<label>Соцмережі</label>
<input id="instagram" placeholder="Instagram">
<input id="youtube" placeholder="YouTube">
<input id="other_social" placeholder="Інші">
</div>

<div class="card">
<label>Телефон</label>
<input id="phone" inputmode="numeric" placeholder="0661234567">

<label>Telegram</label>
<input id="tg" placeholder="@username">
</div>

<div class="card">
<label>Локації</label>
<input id="map1" placeholder="Адреса 1">
<input id="map2" placeholder="Адреса 2">
</div>

<div class="card">
<label>Оплата на картку</label>
<div class="toggle">
<button onclick="setCard(true,this)">Є</button>
<button onclick="setCard(false,this)">Немає</button>
</div>

<div id="card_block" class="hidden">
<input id="card_number" placeholder="Номер картки">
<input id="card_owner" placeholder="ПІБ власника">
</div>
</div>

<div class="card">
<label>Повернення</label>
<div class="toggle">
<button onclick="setReturn(true,this)">Є</button>
<button onclick="setReturn(false,this)">Немає</button>
</div>

<div id="return_block" class="hidden">
<input id="return_cond" placeholder="Умови повернення">
</div>

<label>Обмін</label>
<div class="toggle">
<button onclick="setExchange(true,this)">Є</button>
<button onclick="setExchange(false,this)">Немає</button>
</div>

<div id="exchange_block" class="hidden">
<input id="exchange_cond" placeholder="Умови обміну">
</div>
</div>

<div class="card">
<label>Пароль</label>
<input id="pass">
</div>

</div>

<div class="sticky">
<button class="main-btn" onclick="generate()">Згенерувати</button>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<pre id="result"></pre>
<button onclick="copy()">Скопіювати</button>
</div>
</div>

<script>

bank.onchange=()=>bank_other.classList.toggle("hidden", bank.value!=="Інший");

let card=false, ret=false, ex=false;

function setCard(val,el){
    card=val;
    card_block.classList.toggle("hidden", !val);
    highlight(el);
}
function setReturn(val,el){
    ret=val;
    return_block.classList.toggle("hidden", !val);
    highlight(el);
}
function setExchange(val,el){
    ex=val;
    exchange_block.classList.toggle("hidden", !val);
    highlight(el);
}

function highlight(el){
    [...el.parentNode.children].forEach(b=>b.classList.remove("active"));
    el.classList.add("active");
}

function generate(){

result.textContent = `
Назва: ${shop.value}
Посилання: ${slug.value}

ФОП: ${fop.value}
ЄДРПОУ: ${edrpou.value}
IBAN: ${iban.value}
Банк: ${bank.value === 'Інший' ? bank_other.value : bank.value}

TikTok: ${tt_main.value}
Резерви: ${tt1.value}, ${tt2.value}

Instagram: ${instagram.value}
YouTube: ${youtube.value}
Інше: ${other_social.value}

Телефон: ${phone.value}
Telegram: ${tg.value}

Локації: ${map1.value}, ${map2.value}

Оплата: ${card ? `Картка ${card_number.value}` : 'Немає'}

Повернення: ${ret ? return_cond.value : 'Немає'}
Обмін: ${ex ? exchange_cond.value : 'Немає'}

Пароль: ${pass.value}
`;

modal.style.display="block";
}

function copy(){
navigator.clipboard.writeText(result.textContent);
alert("Скопійовано");
}

</script>

</body>
</html>

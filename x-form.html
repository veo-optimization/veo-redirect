<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Збір даних для міні-сайту</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

h2 {
    text-align: center;
}

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.modal {
    display: none;
    position: fixed;
    z-index: 100;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    margin: 10% auto;
    padding: 20px;
    width: 90%;
    max-width: 600px;
    border-radius: 10px;
}

pre {
    background: #111;
    color: #0f0;
    padding: 10px;
    overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">
    <h2>Створення міні-сайту</h2>

    <input id="fop" placeholder="ФОП">
    <input id="edrpou" placeholder="ЄДРПОУ">
    <input id="iban" placeholder="IBAN">
    <input id="bank" placeholder="Банк">

    <h3>Соцмережі</h3>
    <input id="tiktok" placeholder="TikTok">
    <input id="instagram" placeholder="Instagram">
    <input id="facebook" placeholder="Facebook">
    <input id="youtube" placeholder="YouTube">

    <h3>Контакти</h3>
    <input id="viber" placeholder="Номер Viber">
    <input id="viber_group" placeholder="Група Viber">
    <input id="telegram" placeholder="Telegram username">
    <input id="telegram_group" placeholder="Telegram канал/група">

    <h3>Умови</h3>
    <textarea id="conditions" placeholder="Умови продажу та доставки"></textarea>

    <h3>Додатково</h3>
    <textarea id="extra" placeholder="Будь-яка додаткова інформація"></textarea>

    <h3>Доступ</h3>
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Пароль">

    <h3>Назва посилання</h3>
    <input id="slug" placeholder="Наприклад: veo_me">

    <button onclick="generateData()">Згенерувати дані</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Перевір та скопіюй</h3>
        <pre id="result"></pre>
        <button onclick="copyData()">Скопіювати</button>
        <button onclick="closeModal()">Закрити</button>
    </div>
</div>

<script>
function generateData() {
    const data = {
        fop: document.getElementById('fop').value,
        edrpou: document.getElementById('edrpou').value,
        iban: document.getElementById('iban').value,
        bank: document.getElementById('bank').value,

        social: {
            tiktok: document.getElementById('tiktok').value,
            instagram: document.getElementById('instagram').value,
            facebook: document.getElementById('facebook').value,
            youtube: document.getElementById('youtube').value
        },

        contacts: {
            viber: document.getElementById('viber').value,
            viber_group: document.getElementById('viber_group').value,
            telegram: document.getElementById('telegram').value,
            telegram_group: document.getElementById('telegram_group').value
        },

        conditions: document.getElementById('conditions').value,
        extra: document.getElementById('extra').value,

        auth: {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        },

        slug: document.getElementById('slug').value
    };

    const json = JSON.stringify(data, null, 2);

    document.getElementById('result').textContent = json;
    document.getElementById('modal').style.display = "block";
}

function copyData() {
    const text = document.getElementById('result').textContent;
    navigator.clipboard.writeText(text);
    alert("Скопійовано!");
}

function closeModal() {
    document.getElementById('modal').style.display = "none";
}
</script>

</body>
</html>

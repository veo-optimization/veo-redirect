<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosso TT</title>

<!-- Підключення шрифту Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        text-align: center;
        background: #f0f0f0;
    }

    button {
        margin-top: 100px;
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
    }

    .screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;
        display: none;
    }

    .marquee {
        position: absolute;
        white-space: nowrap;
        font-size: 48px;
        font-weight: 700;
        color: white;
        top: 50%;
        transform: translateY(-50%);
        animation: scrollText 15s linear infinite;
    }

    @keyframes scrollText {
        from {
            left: 100%;
        }
        to {
            left: -100%;
        }
    }
</style>
</head>

<body>

<button onclick="start()">Запустити</button>

<div class="screen" id="screen">
    <div class="marquee">
        Каталог ROSSO TT
    </div>
</div>

<script>
function start() {
    document.getElementById('screen').style.display = 'block';
}
</script>

</body>
</html>
